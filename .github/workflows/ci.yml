# ============================================================
# .github/workflows/ci.yml
# Systematic Alpha — Continuous Integration Pipeline
# ============================================================
#
# Triggers: every push and pull request to main/master
#
# Jobs
# ----
#   lint      : ruff linter (fast, catches 500+ common errors)
#   test      : pytest with coverage (all test files in tests/)
#   docker    : build Docker image (validates Dockerfile syntax)
#   security  : bandit static security scan
#
# ============================================================

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1: Lint (ruff — fast, zero config needed)
  # ──────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter
        run: |
          ruff check . \
            --exclude venv,__pycache__,.git \
            --select E,W,F,I \
            --ignore E501,W503

  # ──────────────────────────────────────────────────────────
  # Job 2: Tests (pytest + coverage)
  # ──────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout

      - name: Run test suite
        env:
          # Disable live API calls in tests
          TELEGRAM_TOKEN: ""
          TELEGRAM_CHAT_ID: ""
          ALPACA_KEY: ""
          ALPACA_SECRET: ""
        run: |
          pytest tests/ \
            --timeout=120 \
            --tb=short \
            -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-omit="venv/*,tests/*,*/__init__.py" \
            --ignore=tests/test_sanity.py \
            -x

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: .coverage
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  # Job 3: Docker build (validates Dockerfile)
  # ──────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false        # do not push on CI — push only from release workflow
          tags: systematic-alpha:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────
  # Job 4: Security scan (bandit)
  # ──────────────────────────────────────────────────────────
  security:
    name: Security Scan (bandit)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: |
          bandit -r . \
            --exclude ./venv,./tests \
            --skip B101,B311 \
            --severity-level medium \
            --confidence-level medium \
            -f txt
